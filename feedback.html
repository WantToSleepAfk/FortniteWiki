<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо!</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            background: rgba(40,40,40,0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            color: gold;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: gold;
            color: black;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            background: orange;
        }

        @media (max-width: 768px) {
            .box {
                width: 90%;
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Спасибо за обратную связь 🙌</h1>
    <p>Мы обязательно её прочитаем!</p>
    <a href="index.html">Вернуться назад</a>
</div>

</body>
</html>
